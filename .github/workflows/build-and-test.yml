name: Build and Test

on:
  push:
    branches: [ main, master, ravimal_dev ]
  pull_request:
    branches: [ main, master, ravimal_dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Notify Vercel on test success
      if: success()
      run: |
        echo "Tests passed! Ready for deployment to Vercel."

    - name: 'notify vercel'
      uses: 'vercel/repository-dispatch/actions/status@v1'
      with:
        name: Vercel - sdd-assignment: deployment-check

    - name: Notify Vercel on test failure
      if: failure()
      run: |
        echo "Tests failed! Blocking deployment to Vercel."
        exit 1
