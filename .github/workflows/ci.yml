name: Node.js Continuous Integration

# 1. Trigger automatically ONLY on your specific branch
on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step A: Check out your Node.js project repository code
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Step B: Set up Node.js environment
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18' # You can change this to '20' or 'lts/*' if preferred
        cache: 'npm'       # Automatically caches dependencies for faster runs

    # Step C: Install project dependencies (maps to `npm install`)
    - name: Install dependencies
      run: npm install

    # Step D: Run the automated tests (maps to `npm test`)
    - name: Run automated tests
      run: npm test